name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  ci:
    name: Lint, Test & Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: listopt_erp_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5434/listopt_erp_test
      SESSION_SECRET: ci-test-secret-key-do-not-use-in-production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to test database
        run: npx prisma db push

      - name: Lint (affected)
        run: npx nx affected -t lint

      - name: Test (affected)
        run: npx nx affected -t test --parallel=1

      - name: E2E Tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload E2E test results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

      - name: Build (affected)
        run: npx nx affected -t build

  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: ci
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build archive
        run: |
          tar -czf deploy.tar.gz \
            --exclude='.next' \
            --exclude='node_modules' \
            --exclude='.env*' \
            --exclude='dev.db' \
            --exclude='.git' \
            --exclude='test-results' \
            --exclude='playwright-report' \
            .
          echo "Archive size: $(du -sh deploy.tar.gz | cut -f1)"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Upload archive to server
        run: scp -i ~/.ssh/deploy_key deploy.tar.gz root@${{ secrets.DEPLOY_HOST }}:/root/

      - name: Deploy on server
        run: |
          ssh -i ~/.ssh/deploy_key root@${{ secrets.DEPLOY_HOST }} bash << 'ENDSSH'
          set -e
          cd /var/www/listopt-erp
          rm -rf .next app/ components/ lib/ prisma/
          tar -xzf /root/deploy.tar.gz
          npm ci
          set -a
          source .env.local 2>/dev/null || source .env 2>/dev/null || true
          set +a
          npx prisma generate
          npx prisma migrate deploy
          npx tsx prisma/seed-accounts.ts
          npx next build
          pm2 restart listopt-erp --update-env
          rm -f /root/deploy.tar.gz
          echo "Deploy complete."
          pm2 list
          ENDSSH
