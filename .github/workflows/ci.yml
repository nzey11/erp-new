name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Phase 1: Verify — lint, test, build (gates the deploy job)
  # ─────────────────────────────────────────────────────────────────────────────
  verify:
    name: Verify (Lint · Test · Build)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: listopt_erp_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd="pg_isready -U test -d listopt_erp_test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5434/listopt_erp_test
      SESSION_SECRET: ci-test-secret-key-do-not-use-in-production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Apply migrations to test database
        run: npx prisma migrate deploy

      # R3-05: Run tenant isolation verification gates on every PR.
      # Each script exits 1 on failure, which blocks the CI job and therefore blocks merge.
      # verify-product-catalog-projection.ts is excluded: it requires a running HTTP server
      # (dual-read against localhost:3000) and is not a DB-only gate — run manually post-deploy.
      # See: .qoder/specs/erp-normalization-roadmap.md P4-06
      - name: Verify Tenant Isolation Gates
        run: |
          npx tsx scripts/verify-product-tenant-gate.ts
          npx tsx scripts/verify-document-tenant-gate.ts
          npx tsx scripts/verify-counterparty-tenant-gate.ts
          npx tsx scripts/verify-payment-tenant-gate.ts

      # R3-05: SKU distribution audit (informational but fails on blocking issues).
      # Exits 1 if within-tenant SKU duplicates exist (would break tenant-scoped uniqueness).
      # See: scripts/audit-sku-distribution.ts
      - name: SKU Distribution Audit
        run: npx tsx scripts/audit-sku-distribution.ts

      # P4-08: Outbox health check gate.
      # Checks for OutboxEvent rows with status FAILED or DEAD older than 1 hour.
      # On a fresh CI database this always exits 0 (no events).
      # On production post-deploy, catches stale dead-letter events that require attention.
      # See: .qoder/specs/erp-normalization-roadmap.md P4-08
      - name: Outbox Health Check
        run: npx tsx scripts/check-outbox-health.ts

      - name: Lint
        run: npx nx affected -t lint

      # P4-07: Explicit tsc --noEmit gate (hard-fail).
      # Catches type errors that next build may not surface in isolation.
      # The tsconfig already has "noEmit": true; this step makes it an explicit CI gate.
      # See: .qoder/specs/erp-normalization-roadmap.md P4-07
      - name: TypeScript type check
        run: npx tsc --noEmit

      # P4-07: Dead code report (soft-fail — continue-on-error).
      # Reports unused locals/imports visible in CI logs without blocking the build.
      # Current baseline: ~37 violations. Escalate to hard-fail after cleanup.
      # TypeScript does not detect unused exports between files — this covers unused locals/imports.
      # See: .qoder/specs/erp-normalization-roadmap.md P4-07
      - name: Dead code report (unused locals)
        run: npx tsc --noEmit --noUnusedLocals || true

      - name: Unit & Integration Tests
        run: npx nx affected -t test --parallel=1

      # Build runs in CI — NOT on production server
      - name: Generate Prisma client (pre-build)
        run: npx prisma generate

      - name: Build
        run: npx next build

      # E2E tests disabled — unstable in CI environment
      # Run locally with: npm run test:e2e

      # Create tar archive with all deployment files while .next/ is guaranteed present
      - name: Package release archive
        run: |
          tar -czf /tmp/release.tar.gz \
            .next/ \
            public/ \
            prisma/ \
            prisma.config.ts \
            scripts/ \
            package.json \
            package-lock.json \
            infra/pm2/ecosystem.config.js \
            next.config.ts
          echo "Archive size: $(du -sh /tmp/release.tar.gz | cut -f1)"
          echo "Check .next in archive:"
          tar -tzf /tmp/release.tar.gz | grep '.next/BUILD_ID' || echo "WARNING: .next/BUILD_ID not found in archive!"

      - name: Upload release archive
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact
          path: /tmp/release.tar.gz
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Phase 2: Deploy — only if verify passes, only on push to main
  # Server receives a ready-built artifact; no next build on production
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download release archive
        uses: actions/download-artifact@v4
        with:
          name: release-artifact

      - name: Create release metadata
        run: |
          RELEASE_ID=$(date -u +%Y%m%d-%H%M%S)
          echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_ENV

          # Extract downloaded archive, inject release.json, repack
          mkdir -p /tmp/pkg
          tar -xzf release.tar.gz -C /tmp/pkg

          cat > /tmp/pkg/release.json << EOF
          {
            "releaseId": "$RELEASE_ID",
            "gitSha": "${{ github.sha }}",
            "gitRef": "${{ github.ref }}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          tar -czf /tmp/release.tar.gz -C /tmp/pkg .
          echo "Archive size: $(du -sh /tmp/release.tar.gz | cut -f1)"
          echo "Verify .next in archive:"
          tar -tzf /tmp/release.tar.gz | grep 'BUILD_ID' | head -3 || echo "WARNING: BUILD_ID missing!"
          rm -rf /tmp/pkg

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: 5.129.243.148
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Lines: $(wc -l < ~/.ssh/deploy_key)"
          echo "Bytes: $(wc -c < ~/.ssh/deploy_key)"
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@5.129.243.148 \
            "echo SSH connection OK"

      - name: Upload archive to server
        run: |
          scp -i ~/.ssh/deploy_key /tmp/release.tar.gz \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/release.tar.gz

      - name: Deploy release on server
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@5.129.243.148 \
            env RELEASE_ID="${{ env.RELEASE_ID }}" bash << 'ENDSSH'
          set -euo pipefail
          BASE=/var/www/listopt-erp
          RELEASE_DIR=$BASE/releases/$RELEASE_ID
          SHARED_DIR=$BASE/shared
          BIN_DIR=$BASE/bin

          echo "==> Creating release directory: $RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"

          echo "==> Extracting archive"
          tar -xzf /tmp/release.tar.gz -C "$RELEASE_DIR"

          echo "==> Linking shared .env"
          ln -sf "$SHARED_DIR/.env" "$RELEASE_DIR/.env"

          echo "==> Installing dependencies"
          cd "$RELEASE_DIR"
          npm ci

          echo "==> Generating Prisma client"
          npx prisma generate

          echo "==> Running migrations"
          npx prisma migrate deploy

          echo "==> Switching current symlink"
          ln -sfn "$RELEASE_DIR" "$BASE/current"

          echo "==> Reloading pm2"
          pm2 delete listopt-erp 2>/dev/null || true
          pm2 start "$BASE/current/infra/pm2/ecosystem.config.js"
          pm2 save

          echo "==> Installing deployment scripts to stable bin/"
          mkdir -p "$BIN_DIR"
          cp "$RELEASE_DIR/scripts/deploy-release.sh"   "$BIN_DIR/deploy-release.sh"
          cp "$RELEASE_DIR/scripts/rollback-release.sh" "$BIN_DIR/rollback-release.sh"
          chmod +x "$BIN_DIR/"*.sh

          echo "==> Cleaning old releases (keep last 7, protect current + bootstrap)"
          CURRENT_REAL=$(readlink -f "$BASE/current" 2>/dev/null | sed 's:/$::')
          find "$BASE/releases" -mindepth 1 -maxdepth 1 -type d \
            | xargs -I{} basename {} \
            | grep -v '^bootstrap$' \
            | sort -r \
            | tail -n +8 \
            | xargs -I{} echo "$BASE/releases/{}" \
            | grep -v "^${CURRENT_REAL}$" \
            | xargs -r rm -rf || true

          rm -f /tmp/release.tar.gz
          echo "==> Deploy complete: $RELEASE_ID"
          pm2 list
          ENDSSH

      - name: Smoke check
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@5.129.243.148 \
            env RELEASE_ID="${{ env.RELEASE_ID }}" bash << 'ENDSSH'
          set -euo pipefail

          echo "==> Smoke check: waiting for app to come online..."
          STATUS=""
          for i in $(seq 1 12); do
            STATUS=$(pm2 list --no-color 2>/dev/null | grep listopt-erp | grep -o 'online\|stopped\|errored' | head -1 || echo "unknown")
            if [[ "$STATUS" == "online" ]]; then break; fi
            echo "  Attempt $i/12: status=$STATUS, waiting 5s..."
            sleep 5
          done

          if [[ "$STATUS" != "online" ]]; then
            echo "ERROR: App did not come online after 60s (status: $STATUS)"
            pm2 logs listopt-erp --lines 50 --nostream
            exit 1
          fi

          echo "==> pm2 status: online"

          RESPONSE=$(curl -sf http://127.0.0.1:3000/api/version 2>/dev/null || echo "")
          if [[ -z "$RESPONSE" ]]; then
            echo "ERROR: /api/version did not respond"
            pm2 logs listopt-erp --lines 30 --nostream
            exit 1
          fi

          ACTIVE_ID=$(echo "$RESPONSE" | grep -o '"releaseId":"[^"]*"' | cut -d'"' -f4 || echo "")
          echo "==> Active releaseId : $ACTIVE_ID"
          echo "==> Expected releaseId: $RELEASE_ID"

          if [[ -z "$ACTIVE_ID" || "$ACTIVE_ID" == "unknown" ]]; then
            echo "ERROR: /api/version returned unknown or empty releaseId"
            pm2 logs listopt-erp --lines 30 --nostream
            exit 1
          fi

          if [[ "$ACTIVE_ID" != "$RELEASE_ID" ]]; then
            echo "ERROR: releaseId mismatch — deploy is not serving the expected release"
            pm2 logs listopt-erp --lines 30 --nostream
            exit 1
          fi

          echo "==> Smoke check passed"
          ENDSSH
