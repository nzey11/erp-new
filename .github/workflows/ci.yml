name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "20"
  NX_CLOUD_ACCESS_TOKEN: ${{ secrets.NX_CLOUD_ACCESS_TOKEN }}

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Phase 1: Verify — lint, test, build (gates the deploy job)
  # ─────────────────────────────────────────────────────────────────────────────
  verify:
    name: Verify (Lint · Test · Build)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: listopt_erp_test
        ports:
          - 5434:5432
        options: >-
          --health-cmd="pg_isready -U test"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://test:test@localhost:5434/listopt_erp_test
      SESSION_SECRET: ci-test-secret-key-do-not-use-in-production

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Derive SHAs for nx affected
        uses: nrwl/nx-set-shas@v4

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Push schema to test database
        run: npx prisma db push

      - name: Lint
        run: npx nx affected -t lint

      - name: Unit & Integration Tests
        run: npx nx affected -t test --parallel=1

      # Build runs in CI — NOT on production server
      # Must run before E2E tests because Playwright uses 'next start' (production mode)
      - name: Build
        run: npx next build

      - name: E2E Tests
        run: npm run test:e2e
        env:
          CI: true

      - name: Upload E2E report on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: test-results/
          retention-days: 7

      # Package only what's needed to run the app
      - name: Package release artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-artifact
          path: |
            .next/
            public/
            prisma/
            prisma.config.ts
            scripts/
            package.json
            package-lock.json
            ecosystem.config.js
            next.config.ts
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Phase 2: Deploy — only if verify passes, only on push to main
  # Server receives a ready-built artifact; no next build on production
  # ─────────────────────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: verify
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Download release artifact
        uses: actions/download-artifact@v4
        with:
          name: release-artifact

      - name: Verify artifact contents
        run: |
          echo "=== Root contents ==="
          ls -la
          echo "=== .next/ exists? ==="
          ls .next/ | head -5 || echo "ERROR: .next/ directory missing!"
          echo "=== BUILD_ID ==="
          cat .next/BUILD_ID || echo "ERROR: no BUILD_ID"

      - name: Create release archive with metadata
        run: |
          RELEASE_ID=$(date -u +%Y%m%d-%H%M%S)
          echo "RELEASE_ID=$RELEASE_ID" >> $GITHUB_ENV

          # Generate release.json — readable via /api/version
          cat > release.json << EOF
          {
            "releaseId": "$RELEASE_ID",
            "gitSha": "${{ github.sha }}",
            "gitRef": "${{ github.ref }}",
            "builtAt": "$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          }
          EOF

          tar -czf /tmp/release.tar.gz .
          echo "Archive size: $(du -sh /tmp/release.tar.gz | cut -f1)"

      - name: Setup SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "Lines: $(wc -l < ~/.ssh/deploy_key)"
          echo "Bytes: $(wc -c < ~/.ssh/deploy_key)"
          ssh-keygen -y -f ~/.ssh/deploy_key >/dev/null
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Test SSH connection
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "echo SSH connection OK"

      - name: Upload archive to server
        run: |
          scp -i ~/.ssh/deploy_key /tmp/release.tar.gz \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:/tmp/release.tar.gz

      - name: Deploy release on server
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            env RELEASE_ID="${{ env.RELEASE_ID }}" bash << 'ENDSSH'
          set -euo pipefail
          BASE=/var/www/listopt-erp
          RELEASE_DIR=$BASE/releases/$RELEASE_ID
          SHARED_DIR=$BASE/shared
          BIN_DIR=$BASE/bin

          echo "==> Creating release directory: $RELEASE_DIR"
          mkdir -p "$RELEASE_DIR"

          echo "==> Extracting archive"
          tar -xzf /tmp/release.tar.gz -C "$RELEASE_DIR"

          echo "==> Linking shared .env"
          ln -sf "$SHARED_DIR/.env" "$RELEASE_DIR/.env"

          echo "==> Installing dependencies"
          cd "$RELEASE_DIR"
          npm ci

          echo "==> Generating Prisma client"
          npx prisma generate

          echo "==> Running migrations"
          npx prisma migrate deploy

          echo "==> Switching current symlink"
          ln -sfn "$RELEASE_DIR" "$BASE/current"

          echo "==> Reloading pm2"
          pm2 startOrRestart "$BASE/current/ecosystem.config.js" --update-env
          pm2 save

          echo "==> Installing deployment scripts to stable bin/"
          mkdir -p "$BIN_DIR"
          cp "$RELEASE_DIR/scripts/deploy-release.sh"   "$BIN_DIR/deploy-release.sh"
          cp "$RELEASE_DIR/scripts/rollback-release.sh" "$BIN_DIR/rollback-release.sh"
          chmod +x "$BIN_DIR/"*.sh

          echo "==> Cleaning old releases (keep last 7, protect current + bootstrap)"
          CURRENT_REAL=$(readlink -f "$BASE/current" 2>/dev/null | sed 's:/$::')
          find "$BASE/releases" -mindepth 1 -maxdepth 1 -type d \
            | xargs -I{} basename {} \
            | grep -v '^bootstrap$' \
            | sort -r \
            | tail -n +8 \
            | xargs -I{} echo "$BASE/releases/{}" \
            | grep -v "^${CURRENT_REAL}$" \
            | xargs -r rm -rf || true

          rm -f /tmp/release.tar.gz
          echo "==> Deploy complete: $RELEASE_ID"
          pm2 list
          ENDSSH

      - name: Smoke check
        run: |
          ssh -i ~/.ssh/deploy_key \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            env RELEASE_ID="${{ env.RELEASE_ID }}" bash << 'ENDSSH'
          set -euo pipefail

          echo "==> Smoke check: waiting for app to come online..."
          STATUS=""
          for i in $(seq 1 12); do
            STATUS=$(pm2 list --no-color 2>/dev/null | grep listopt-erp | grep -o 'online\|stopped\|errored' | head -1 || echo "unknown")
            if [[ "$STATUS" == "online" ]]; then break; fi
            echo "  Attempt $i/12: status=$STATUS, waiting 5s..."
            sleep 5
          done

          if [[ "$STATUS" != "online" ]]; then
            echo "ERROR: App did not come online after 60s (status: $STATUS)"
            pm2 logs listopt-erp --lines 50 --nostream
            exit 1
          fi

          echo "==> pm2 status: online"

          RESPONSE=$(curl -sf http://127.0.0.1:3000/api/version 2>/dev/null || echo "")
          if [[ -z "$RESPONSE" ]]; then
            echo "ERROR: /api/version did not respond"
            pm2 logs listopt-erp --lines 30 --nostream
            exit 1
          fi

          ACTIVE_ID=$(echo "$RESPONSE" | grep -o '"releaseId":"[^"]*"' | cut -d'"' -f4 || echo "")
          echo "==> Active releaseId : $ACTIVE_ID"
          echo "==> Expected releaseId: $RELEASE_ID"

          if [[ -z "$ACTIVE_ID" || "$ACTIVE_ID" == "unknown" ]]; then
            echo "ERROR: /api/version returned unknown or empty releaseId"
            pm2 logs listopt-erp --lines 30 --nostream
            exit 1
          fi

          if [[ "$ACTIVE_ID" != "$RELEASE_ID" ]]; then
            echo "ERROR: releaseId mismatch — deploy is not serving the expected release"
            pm2 logs listopt-erp --lines 30 --nostream
            exit 1
          fi

          echo "==> Smoke check passed"
          ENDSSH
