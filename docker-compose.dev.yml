services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "3000:3000"
    volumes:
      # Mount source code for hot reload
      - .:/app
      # Exclude node_modules - use container's version
      - /app/node_modules
      # .next is intentionally NOT excluded - written to host mount
      # so hot reload and cache are always fresh from host filesystem
    environment:
      - NODE_ENV=development
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/listopt_erp
      - SESSION_SECRET=dev-secret-key-change-in-production
      - SECURE_COOKIES=false
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"  # Exposed for local Prisma commands
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=listopt_erp
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d listopt_erp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
